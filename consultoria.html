<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultoria VIP | Pink Dress</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="488578531_2032792070558680_6941908533414280762_n.jpg" alt="Logo" class="logo-img">
            PINK <span class="logo-text-dress">DRESS</span>
        </div>
        <input type="checkbox" id="menu-check">
        <label for="menu-check" class="menu-icon">
            <span></span><span></span><span></span>
        </label>
        <ul class="nav-links">
            <li><a href="index.html">Início</a></li>
            <li><a href="index.html#vitrine">Coleções</a></li>
            <li><a href="consultoria.html" class="active">Consultoria</a></li>
        </ul>
    </nav>
</header>

<section class="consultoria-section" style="padding: 160px 8% 80px; background: var(--bg-off);">
    <div class="container-flex" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 60px;">
        <div class="info-box">
            <h2 style="font-family: 'Playfair Display'; font-size: 3rem; margin-bottom: 20px;">Experiência <span style="color: var(--primary);">VIP</span></h2>
            <p>Não vendemos apenas vestidos, curamos o seu momento especial.</p>
        </div>
        <div class="form-box" style="background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
            <h3>Agende sua Sessão</h3>
            <form action="#" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <input type="text" placeholder="Nome Completo" style="padding: 12px; border: 1px solid #ddd; border-radius: 5px;">
                <input type="email" placeholder="E-mail" style="padding: 12px; border: 1px solid #ddd; border-radius: 5px;">
                <button type="submit" class="btn-primary">Solicitar Agendamento</button>
            </form>
        </div>
    </div>
</section>

<footer style="padding: 40px; text-align: center; background: #fff; border-top: 1px solid #eee;">
    <p>&copy; 2026 Pink Dress Fest • Aquiles Softwares</p>
</footer>
</body>
</html>
