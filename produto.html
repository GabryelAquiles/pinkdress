<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto | Pink Dress</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .product-detail-container { padding: 120px 8% 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        .detail-img img { width: 100%; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .detail-info h1 { font-family: 'Playfair Display'; font-size: 2.8rem; margin-bottom: 15px; }
        .detail-price { color: var(--primary); font-size: 2rem; font-weight: 700; margin-bottom: 25px; display: block; }
        .detail-desc { line-height: 1.8; color: var(--text-light); margin-bottom: 40px; font-size: 1.1rem; }
        
        @media (max-width: 768px) {
            .product-detail-container { grid-template-columns: 1fr; padding: 100px 5% 50px; text-align: center; }
            .detail-info h1 { font-size: 2rem; }
        }
        <style>
    /* ... seus estilos anteriores ... */

    @media (max-width: 768px) {
        .product-detail-container {
            padding: 90px 5% 40px;
            display: flex;
            flex-direction: column;
        }

        .detail-img {
            order: 1; /* Imagem primeiro */
            margin-bottom: 20px;
        }

        .detail-info {
            order: 2; /* Texto depois */
            text-align: left; /* Alinhamento à esquerda é mais fácil de ler */
        }

        .detail-info h1 { font-size: 1.8rem; }
        
        /* Botão Flutuante ou de destaque */
        .btn-primary {
            width: 100%;
            text-align: center;
            padding: 20px;
            position: sticky; /* Opcional: faz o botão "grudar" embaixo */
            bottom: 20px;
            box-shadow: 0 10px 20px rgba(255, 105, 180, 0.3);
        }
    }
</style>
    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="488578531_2032792070558680_6941908533414280762_n.jpg" alt="Logo" class="logo-img">
            PINK <span class="logo-text-dress">DRESS</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Voltar para Vitrine</a></li>
        </ul>
    </nav>
</header>

<section class="product-detail-container">
    <div class="detail-img">
        <img id="main-img" src="" alt="Carregando imagem...">
    </div>
    <div class="detail-info">
        <h1 id="product-title">Carregando...</h1>
        <span class="detail-price" id="product-price"></span>
        <p class="detail-desc" id="product-desc"></p>
        <a href="#" id="whatsapp-btn" target="_blank" class="btn-primary">Consultar via WhatsApp</a>
    </div>
</section>

<script>
    const database = {
        "imperial-gold": {
            titulo: "Vestido Imperial Gold",
            preco: "R$ 1.800,00",
            desc: "Vestido de gala exclusivo em cetim premium com bordados feitos à mão. O brilho que você precisa para uma noite inesquecível.",
            imagem: "https://images.unsplash.com/photo-1566174053879-31528523f8ae?q=80&w=800"
        },
        "silk-blue": {
            titulo: "Vestido Silk Blue",
            preco: "R$ 950,00",
            desc: "Fluidez e sofisticação em seda pura. Ideal para eventos ao ar livre e ocasiões que pedem leveza.",
            imagem: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?q=80&w=800"
        },
        "black-velvet": {
            titulo: "Vestido Black Velvet",
            preco: "R$ 1.200,00",
            desc: "O clássico que nunca falha. Veludo de alta qualidade com corte acinturado para realçar sua silhueta.",
            imagem: "https://images.unsplash.com/photo-1539008835657-9e8e9680fe0a?q=80&w=800"
        }
    };

    const params = new URLSearchParams(window.location.search);
    const itemKey = params.get('item');

    if (database[itemKey]) {
        const item = database[itemKey];
        document.getElementById('product-title').innerText = item.titulo;
        document.getElementById('product-price').innerText = item.preco;
        document.getElementById('product-desc').innerText = item.desc;
        document.getElementById('main-img').src = item.imagem;
        
        const msg = encodeURIComponent(`Olá! Tenho interesse no vestido: ${item.titulo}`);
        document.getElementById('whatsapp-btn').href = `https://wa.me/5500000000000?text=${msg}`;
    } else {
        window.location.href = "index.html"; 
    }
</script>

</body>
</html>
